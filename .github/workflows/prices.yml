name: Refresh prices
on:
  schedule:
    - cron: '30 23 * * *'  # 23:30 UTC — right after TCGcsv's daily 21:00-23:00 UTC refresh
    - cron: '0 11 * * *'   # 11:00 UTC backup in case the source window slips
  workflow_dispatch:        # manual run button in the Actions tab
permissions:
  contents: write
jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: 24 }
      - run: node generate-prices.mjs
      - name: Commit if changed
        run: |
          git config user.name "holomint-bot"
          git config user.email "actions@github.com"
          git add prices.json products.json || true
          git diff --cached --quiet || git commit -m "Daily price refresh"
          git push

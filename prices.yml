name: Refresh prices
on:
  schedule:
    - cron: '17 9 * * *'   # daily ~9:17 UTC
  workflow_dispatch:        # manual run button in the Actions tab
permissions:
  contents: write
jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: node generate-prices.mjs
      - name: Commit if changed
        run: |
          git config user.name "holomint-bot"
          git config user.email "actions@github.com"
          git add prices.json products.json || true
          git diff --cached --quiet || git commit -m "Daily price refresh"
          git push
